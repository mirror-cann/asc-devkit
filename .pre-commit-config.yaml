minimum_pre_commit_version: 4.0.0
exclude: ^LICENSES/|\.(html|csv|svg|tsv)$

default_stages: [pre-commit]
ci:
  autofix_prs: false
  autoupdate_schedule: monthly

repos:
  # pre-commit 基础检查
  - repo: https://gitcode.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
        exclude: \.md$
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-json
        exclude: ^\.devcontainer/devcontainer\.json$

  # C++ 代码格式化检查
  - repo: https://gitcode.com/pre-commit-clang/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        types_or: [file]
        files: \.(c|h|cpp|hpp|cc|hh|cxx|hxx|asc)$
        exclude: ^(tests/python/aclrt_launch_kernel/stub_files/|include/(?!adv_api/))
        args:
          - "--style=file"
          - "--verbose"
          - "-i"

  # Python 代码检查
  - repo: https://gitcode.com/gh_mirrors/ru/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff-check
        # 临时忽略存量问题，按目录治理后逐项移除。
        args:
          - "--output-format"
          - "github"
          - "--fix"
          - "--target-version"
          - "py37"
          - "--extend-ignore"
          - "E402,E711,E712,E721,F401,F403,F405,F811,F821,F841,F523"
        types: [python]
        files: ^(cmake|docs|impl|scripts|tests|tools)/
        exclude: &ruff_exclude |
          (?x)^(
            \.agent/|
            cmake/asc/legacy_modules/util/extract_host_stub\.py|
            tests/python/aclrt_launch_kernel/test_aclrt_launch_kernel\.py|
            tests/python/adapter/test_ascendc_super_kernel\.py|
            tests/python/adapter/test_compile_op\.py|
            tests/python/adapter/test_get_op_tiling\.py|
            tests/python/asc_op_compiler/test_ascendc_super_kernel\.py|
            tests/python/asc_op_compiler/test_compile_op\.py|
            tests/python/asc_op_compiler/test_get_op_tiling\.py|
            tests/python/asc_opc/stub/files/conv_compute\.py|
            tests/python/asc_opc/stub/files/gather_v2\.py|
            tests/python/asc_opc/stub/files/ge_ir_pb2\.py|
            tools/build/asc_op_compile_base/adapter/compile_op\.py|
            tools/build/asc_op_compile_base/asc_op_compiler/compile_op\.py
          )$
      - id: ruff-format
        args:
          - "--target-version"
          - "py37"
        types: [python]
        files: ^(cmake|docs|impl|scripts|tests|tools)/
        exclude: *ruff_exclude

  # OAT 合规性检查 (Open Source Audit Tool)
  - repo: local
    hooks:
      - id: oat-check
        name: OAT Compliance Check
        entry: bash scripts/oat_check.sh
        language: system
        pass_filenames: true
        types: [file]
        stages: [pre-commit]
        verbose: true

  # Markdown 链接有效性检查
  - repo: local
    hooks:
      - id: markdown-link-check
        name: Markdown link check
        entry: env LYCHEE_VERSION=0.23.0 bash scripts/markdown_link_check.sh
        language: system
        files: \.(md|markdown|mdx)$
        exclude: ^CHANGELOG(_en)?\.md$
        pass_filenames: true
        always_run: true
        stages: [pre-commit, manual]
        verbose: true
