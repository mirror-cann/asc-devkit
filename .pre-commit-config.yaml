minimum_pre_commit_version: 4.0.0
exclude: ^LICENSES/|\.(html|csv|svg)$

default_stages: [pre-commit]
ci:
  autofix_prs: false
  autoupdate_schedule: monthly

repos:
  # C++ 代码格式化检查
  - repo: https://gitcode.com/pre-commit-clang/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        files: ^tests/.*\.(c|h|cpp|hpp|cc|hh|cxx|hxx|asc)$
        exclude: ^tests/python/aclrt_launch_kernel/stub_files/
        args:
          - "--style=file"
          - "--verbose"
          - "-i"

  # OAT 合规性检查 (Open Source Audit Tool)
  - repo: local
    hooks:
      - id: oat-check
        name: OAT Compliance Check
        entry: bash scripts/oat_check.sh
        language: system
        pass_filenames: true
        types: [file]
        stages: [pre-commit]
        verbose: true
